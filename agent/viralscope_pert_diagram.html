<script>
const tooltip = document.getElementById('tooltip');
const descriptions = {
  "T0.1": "Create Python virtual environment (venv/)",
  "T0.2": "Upgrade pip; install PyTorch, transformers, gradio, captum…",
  "T0.3": "Verify all imports; create project directory structure",
  "T0.4": "Create .gitignore + .gitkeep files (optional)",
  "T1.1": "Download Kaggle YouTube Trending Dataset → data/raw/trending.csv",
  "T1.2": "Deduplicate by video_id (keep last), drop invalid rows → clean_dataset.csv",
  "T1.3": "Parallel-download thumbnails from YouTube CDN → thumbnails/ + manifest.csv",
  "T1.4": "Keep only videos with valid downloaded thumbnails → final_dataset.csv",
  "T1.5": "Per-channel LOO avg views + video count → channel_averages.csv",
  "T1.6": "Viral labeling via LOO multiplier (×1.5 threshold) → labeled_dataset.csv",
  "T1.7": "DistilBERT tokenize all titles → input_ids.pt + attention_masks.pt (IMMUTABLE checkpoint)",
  "T1.9": "GroupShuffleSplit by channel_id (no leakage) → train/val/test_indices.pt + split_report.json",
  "T1.10": "Class weights from train distribution (normalized to sum=2) → class_weights.pt",
  "T2.1": "Frozen MobileNetV2 backbone → CVExtractor class → models/cv_extractor.py",
  "T2.2": "Forward pass validation with real 64-sample thumbnail batch",
  "T3.1": "Frozen DistilBERT [CLS] extractor → NLPExtractor class → models/nlp_extractor.py",
  "T3.2": "Forward pass validation with pre-tokenized tensor batch",
  "T4.1": "Focal Loss (alpha + gamma) for imbalanced binary classification → models/losses.py",
  "T4.2": "Fusion MLP: Linear→BN→ReLU→Dropout × 2 → models/fusion_model.py",
  "T4.3": "ViralScopeModel = CVExtractor + NLPExtractor + FusionMLP → models/multimodal.py",
  "T4.4": "ViralScopeDataset with on-the-fly image loading + augmentations → data/dataset.py",
  "T4.5": "Training loop: AdamW + Focal Loss + ReduceLROnPlateau + early stopping → best_model.pt",
  "T4.6": "OPTIONAL: Unfreeze backbones, fine-tune with 10× lower LR (only if val PR-AUC < 0.50)",
  "T5.1": "Evaluate best_model.pt on test set → results/metrics.json (AUC-ROC, F1, CM)",
  "T5.2": "Implement Grad-CAM for MobileNetV2 last conv layer → xai/gradcam.py",
  "T5.3": "Implement Captum Integrated Gradients for token attributions → xai/integrated_gradients.py",
  "T5.4": "Inference pipeline: load model, preprocess inputs, call XAI → app/inference.py",
  "T5.6": "Gradio UI: thumbnail upload + title → viral score + visual XAI → app/gradio_app.py",
  "END":  "ViralScope AI MVP — locally-running Gradio demo with full XAI explanations"
};

document.querySelectorAll('.node-group').forEach(el => {
  el.addEventListener('mouseenter', (e) => {
    const id = el.getAttribute('data-id');
    const desc = descriptions[id] || el.getAttribute('data-desc') || '';
    tooltip.textContent = `${id}: ${desc}`;
    tooltip.style.display = 'block';
  });
  el.addEventListener('mousemove', (e) => {
    const rect = el.closest('svg').parentElement.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top  = (e.clientY - rect.top  + 12) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
});
</script>
