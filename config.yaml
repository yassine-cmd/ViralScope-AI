# ============================================================
# VIRALSCOPE AI - Configuration
# ============================================================

project:
  name: "ViralScope AI"
  seed: 42
  device: "auto"  # auto, cpu, cuda

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  tensor_dir: "data/tensors"
  splits_dir: "data/splits"

  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

  min_dataset_size: 10000
  target_threshold: 1.5  # Multiplier > 1.5 = viral

  thumbnail_url_template: "https://img.youtube.com/vi/{video_id}/maxresdefault.jpg"
  thumbnail_fallback_url: "https://img.youtube.com/vi/{video_id}/hqdefault.jpg"
  thumbnail_rate_limit: 10  # requests per second (YouTube CDN safe limit)

training:
  batch_size: 32
  num_workers: 2  # DataLoader workers for parallel data loading
  epochs: 50

  # Learning rates (staggered for CLIP fine-tuning)
  lr_head: 0.001          # Fusion MLP head
  lr_head_stage2: 0.0001  # Fusion MLP after unfreezing backbones
  lr_backbone_cv: 0.000005   # CLIP Vision backbone
  lr_backbone_nlp: 0.000005  # CLIP Text backbone

  # Optimizer
  weight_decay: 0.0001
  betas: [0.9, 0.999]

  # Loss — use BCEWithLogitsLoss (WeightedRandomSampler handles class imbalance)
  loss_function: "BCEWithLogitsLoss"
  focal_loss_gamma: 2.0

  # Scheduler — CosineAnnealingWarmRestarts for smooth fine-tuning
  scheduler: "CosineAnnealingWarmRestarts"
  scheduler_T_0: 10       # First restart period (epochs)
  scheduler_T_mult: 2     # Multiply period after each restart
  scheduler_eta_min: 0.000001
  scheduler_factor: 0.1    # Legacy key for validation
  scheduler_patience: 5    # Legacy key for validation

  # Early stopping
  early_stopping_patience: 10
  early_stopping_metric: "val_pr_auc"
  early_stopping_mode: "max"

  # Gradient clipping
  gradient_clip_norm: 1.0

  # Two-stage training
  two_stage:
    enabled: true
    head_warmup_epochs: 5
    unfreeze_cv: true
    unfreeze_nlp: true

  # Metrics tracking
  track_metrics: ["accuracy", "precision", "recall", "f1", "auc_roc", "pr_auc"]
  metric_average: "binary"

model:
  # Unified CLIP backbone for both vision and text
  clip:
    checkpoint: "openai/clip-vit-base-patch32"
    feature_dim: 512
    max_seq_length: 77   # CLIP's native context length
    freeze_backbone: true

  fusion:
    # Input = 4 * 512 (img, txt, diff, prod) + 1 (cos_sim) = 2049
    hidden_layers: [256, 64]
    dropout: 0.2
    activation: "GELU"

  # Legacy sections for notebook validation
  cv:
    pretrained: true
    feature_dim: 512
    freeze_backbone: true
  nlp:
    checkpoint: "openai/clip-vit-base-patch32"
    max_seq_length: 77
    feature_dim: 512
    freeze_backbone: true

augmentation:
  rotation_range: [-10, 10]
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.1
  horizontal_flip_prob: 0.0
  resize_size: [224, 224]
  # CLIP normalization (NOT ImageNet)
  normalize_mean: [0.48145466, 0.4578275, 0.40821073]
  normalize_std: [0.26862954, 0.26130258, 0.27577711]

xai:
  gradcam:
    upsampling_mode: "bicubic"
  integrated_gradients:
    n_steps: 50
    baseline_type: "pad_token"
  visualization:
    positive_color: "green"
    negative_color: "red"
    heatmap_alpha: 0.4

deployment:
  gradio:
    title: "ViralScope AI - YouTube Viral Potential Predictor"
    description: "Upload your thumbnail and enter your title to predict viral potential."
    thumbnail_label: "Video Thumbnail"
    title_label: "Video Title"
    submit_button: "Analyze"

paths:
  checkpoints: "models/checkpoints"
  best_model: "models/best_model.pt"
  training_log: "models/training_log.csv"
  results: "results/"