                      - text: According to Variety magazine
                    - text: ", “To determine the year’s top-trending videos, YouTube uses a combination of factors including measuring users interactions (number of views, shares, comments and likes). Note that they’re not the most-viewed videos overall for the calendar year”. Top performers on the YouTube trending list are music videos (such as the famously virile “Gangam Style”), celebrity and/or reality TV performances, and the random dude-with-a-camera viral videos that YouTube is well-known for."
                  - paragraph [ref=e215]: This dataset is a daily record of the top trending YouTube videos.
                  - paragraph [ref=e216]:
                    - text: Note that this dataset is a structurally improved version of
                    - link [ref=e1974] [cursor=pointer]:
