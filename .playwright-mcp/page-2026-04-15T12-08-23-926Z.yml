                    - text: .
                  - heading [level=3] [ref=e1975]: Content
                  - paragraph [ref=e219]: This dataset includes several months (and counting) of data on daily trending YouTube videos. Data is included for the US, GB, DE, CA, and FR regions (USA, Great Britain, Germany, Canada, and France, respectively), with up to 200 listed trending videos per day.
                  - paragraph [ref=e220]: "EDIT: Now includes data from RU, MX, KR, JP and IN regions (Russia, Mexico, South Korea, Japan and India respectively) over the same time period."
                  - paragraph [ref=e221]: Each region’s data is in a separate file. Data includes the video title, channel title, publish time, tags, views, likes and dislikes, description, and comment count.
                  - paragraph [ref=e222]:
                    - text: The data also includes a
                    - code [ref=e223]: category_id
                    - text: field, which varies between regions. To retrieve the categories for a specific video, find it in the associated
                    - code [ref=e224]: JSON
                    - text: . One such file is included for each of the five regions in the dataset.
                  - paragraph [ref=e225]:
                    - text: For more information on specific columns in the dataset refer to the
                    - link [ref=e1976] [cursor=pointer]:
